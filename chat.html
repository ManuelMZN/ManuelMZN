<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgb(184, 253, 255);
        text-align: center;
    }

    #navigation {
        background-color: #6eadff;
        width: 100%;
        height: 9.3vh;
        display: flex;
        align-items: center;
        padding: 0 12px;
    }

    .logo {
        height: 70%;
        cursor: pointer;
    }

    .tabs {
        display: flex;
        gap: 12px;
        justify-content: flex-start;
        align-items: center;
        flex: 1;
        margin-left: 12px;
    }

    .tab {
        background-color: #6ecaff;
        border: 3px solid #6ecaffad;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        padding: 8px 20px;
        height: 52%;
        flex: 0 0 140px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    #banner {
        background-color: #fffbec;
        width: 100%;
        border-bottom: 3px solid #b6b3a9;
        border-top: 3px solid #fffaeb;
        margin-bottom: 20px;
        margin-top: 20px;
        font-size: 1.3rem;
    }

    .content {
        background-image: url("../assets/pin.png");
        border: 1.5vw groove rgb(161, 131, 75) !important;
        height: 75%;
        display: inline-block;
        vertical-align: top;
    }
    .chat {
        width: 90%;
        background-color: rgb(212, 195, 39);
        border: 3px outset rgba(212, 195, 39, 0.534);
        height: 10%;
        text-align: left;
        margin-top: 3px;
    }

    @media (max-width: 700px) {
        .tab { padding: 6px 10px; flex: 0 0 100px; font-size: 0.9rem; }
    }
</style>
