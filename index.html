<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgb(184, 253, 255)
    }

    #navigation {
        background-color: #6eadff;
        width: 100%;
        height: 9.3vh;
        display: flex;
        align-items: center;
        padding: 0 12px;
    }

    #site {
        align-items: center;
        text-align: center;
    }

    .logo {
        height: 70%;
        cursor: pointer;
    }

    .tabs {
        display: flex;
        gap: 12px;
        justify-content: flex-start;
        align-items: center;
        flex: 1;
        margin-left: 12px;
    }

    .tab {
        background-color: #6ecaff;
        border: 3px solid #6ecaffad;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        padding: 8px 20px;
        height: 52%;
        flex: 0 0 140px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    #banner {
        background-color: #fffbec;
        width: 100%;
        border-bottom: 3px solid #b6b3a9;
        border-top: 3px solid #fffaeb;
        margin-bottom: 20px;
        margin-top: 20px;
        font-size: 1.3rem;
    }

    .content {
        background-image: url("../assets/pin.png");
        border: 1.5vw groove rgb(161, 131, 75);
    }

    @media (max-width: 600px) {
        .tab { padding: 6px 10px; flex: 0 0 100px; font-size: 0.9rem; }
    }
</style>
<head>
    <title>ManuelMZN - Home</title>
    <link rel="icon" type="image/png" href="../assets/icon.png">
</head>
<div id="navigation">
    <img class="logo" src="../assets/manuelmzn.png" alt="logo" onclick="load('../index')">
    <div class="tabs">
        <button onclick="load('../news')" class="tab">News/Changelog</button>
        <button onclick="load('../chat')" class="tab">Chatroom</button>
        <button onclick="load('../projects/index')" class="tab">Projects</button>
        <button onclick="load('../about')" class="tab">About me</button>
        <button onclick="load('../ppl')" class="tab">Cool people</button>
        <button onclick="load('../guestbook')" class="tab">Guestbook</button>
    </div>
</div>
<div id="site">
    <div id="banner"></div>
    <iframe src="ihome.html" width="45%" height="50%" class="content" id="feed"></iframe>
    <iframe src="https://www5.cbox.ws/box/?boxid=963340&boxtag=w1Qj0W" width="25%" height="50%" class="content"></iframe>
    <iframe src="random.html" width="70%" height="25%" class="content"></iframe>
</div>
<script>
    function load(page) {
        window.location.href = `${page}.html`;
    }
    let possabilitys = "";
    fetch('random/banner.txt')
        .then(response => response.text())
        .then(data => { possabilitys = data; getRandomBanner(); });
    function getRandomBanner() {
        let i = 0;
        let j = 0;
        let a = 0;
        let rand = 0;
        let x = "";
        let mode = 0;
        while(i < possabilitys.length) {
            if(possabilitys.at(i) == "|") {
                if(mode == 0) {
                    a = parseInt(x);
                    rand = Math.floor(Math.random() * a);
                    x = "";
                    mode = 1;
                } else {
                    if(j == rand) {
                        document.getElementById("banner").innerHTML = x;
                        break;
                    } else {
                        j++;
                        x = "";
                    }
                }
            } else {
                x = x + possabilitys.at(i);
            }
            i++;
        }
    }
    const feed = document.getElementById("feed");
    function url(){
        if(feed.contentWindow.location.href != "https://manuelmzn.netlify.app/ihome.html" && feed.contentWindow.location.href != "about:blank"){
            window.location.href = feed.contentWindow.location.href;
        } 
    }
    setInterval(url, 100);
</script>
