        word-wrap: break-word;
        hyphens: auto; 
    }

    .date {

        color: black;
    }

    .iframe-wrapper {

        overflow: hidden;
        position: relative;
    }

    .content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 2px solid black;
        box-sizing: border-box;
        transform-origin: top left;

</style>
